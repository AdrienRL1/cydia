<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AppDrop — Modération des uploads</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: -apple-system, system-ui, Helvetica, Arial, sans-serif; margin: 0;
         background: #f2f2f7; color: #111; }
  @media (prefers-color-scheme: dark) { body { background: #14161a; color: #e8e8ea; }
    .card { background: #20242b !important; border-color: #333 !important; }
    input { background: #2a2f37 !important; color: #e8e8ea !important; border-color: #3a4049 !important; } }
  header { background: #2b6cb0; color: #fff; padding: 14px 16px; position: sticky; top: 0; }
  header h1 { margin: 0; font-size: 18px; }
  .wrap { max-width: 820px; margin: 0 auto; padding: 16px; }
  .bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
  input { padding: 9px 10px; border: 1px solid #ccd; border-radius: 8px; font-size: 15px; flex: 1; min-width: 180px; }
  button { padding: 9px 14px; border: 0; border-radius: 8px; font-size: 15px; cursor: pointer; }
  .btn-load { background: #2b6cb0; color: #fff; }
  .btn-ok   { background: #1f9d55; color: #fff; }
  .btn-no   { background: #c53030; color: #fff; }
  .card { background: #fff; border: 1px solid #e2e2ea; border-radius: 12px; padding: 14px; margin-bottom: 14px; }
  .tag { display: inline-block; font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 999px; }
  .tag-mods { background: #e9d8fd; color: #553c9a; }
  .tag-rev  { background: #c6f6d5; color: #22543d; }
  .name { font-size: 17px; font-weight: 700; margin: 6px 0; }
  .meta { font-size: 13px; color: #667; margin: 2px 0; }
  .desc { font-size: 14px; margin: 8px 0; white-space: pre-wrap; }
  .actions { display: flex; gap: 8px; margin-top: 10px; }
  a.ipa { font-size: 13px; word-break: break-all; }
  .empty, .err { padding: 20px; text-align: center; color: #667; }
  .err { color: #c53030; }
</style>
</head>
<body>
<header><h1>🛡️ AppDrop — Modération des uploads</h1></header>
<div class="wrap">
  <div class="bar">
    <input id="url" placeholder="URL du Worker" />
    <input id="token" type="password" placeholder="Clé d'admin (ADMIN_TOKEN)" />
    <button class="btn-load" onclick="load()">Charger les uploads en attente</button>
  </div>
  <div id="list"><div class="empty">Entre la clé d'admin puis « Charger ».</div></div>
</div>
<script>
  var DEFAULT_URL = "https://appdrop-feedback.adrienruestlorquet.workers.dev";
  var urlEl = document.getElementById("url"), tokEl = document.getElementById("token"), listEl = document.getElementById("list");
  urlEl.value = localStorage.getItem("appdrop_worker") || DEFAULT_URL;
  tokEl.value = localStorage.getItem("appdrop_admin") || "";

  function base() { return (urlEl.value || DEFAULT_URL).replace(/\/+$/, ""); }
  function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]; }); }

  function load() {
    localStorage.setItem("appdrop_worker", urlEl.value);
    localStorage.setItem("appdrop_admin", tokEl.value);
    listEl.innerHTML = '<div class="empty">Chargement…</div>';
    fetch(base() + "/pending", { headers: { "X-Admin-Token": tokEl.value } })
      .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
      .then(function (res) {
        if (!res.ok) { listEl.innerHTML = '<div class="err">Erreur : ' + esc(res.j.error || "") + ' (clé d\'admin correcte ?)</div>'; return; }
        render(res.j.pending || []);
      })
      .catch(function (e) { listEl.innerHTML = '<div class="err">Échec réseau : ' + esc(e) + '</div>'; });
  }

  function render(items) {
    if (!items.length) { listEl.innerHTML = '<div class="empty">Aucun upload en attente. 🎉</div>'; return; }
    listEl.innerHTML = "";
    items.forEach(function (e) {
      var rev = e.target === "revival";
      var card = document.createElement("div"); card.className = "card";
      card.innerHTML =
        '<span class="tag ' + (rev ? "tag-rev" : "tag-mods") + '">' + (rev ? "Fonctionne aujourd\'hui" : "Apps modifiées") + '</span>' +
        '<div class="name">' + esc(e.name) + (e.version ? ' <span class="meta">v' + esc(e.version) + '</span>' : '') + '</div>' +
        (e.mod ? '<div class="meta"><b>Modif :</b> ' + esc(e.mod) + '</div>' : '') +
        '<div class="meta">bid : ' + esc(e.bid || "—") + ' · iOS min : ' + esc(e.min_ios || "—") +
          ' · ' + Math.round((e.size || 0) / 1048576 * 10) / 10 + ' Mo · crédit : ' + esc(e.credit || "—") + '</div>' +
        '<div class="desc">' + esc(e.description || "(pas de description)") + '</div>' +
        '<div class="meta">de : ' + esc(e.device || "?") + ' · ' + esc(e.lang || "?") + '</div>' +
        '<div class="meta">⬇ <a class="ipa" href="' + esc(e.ipa_url) + '" target="_blank" rel="noopener">' + esc(e.ipa_url) + '</a></div>' +
        '<div class="actions"></div>';
      var actions = card.querySelector(".actions");
      var ok = document.createElement("button"); ok.className = "btn-ok"; ok.textContent = "✓ Approuver";
      ok.onclick = function () { act("/approve", e.id, ok, "Publication…"); };
      var no = document.createElement("button"); no.className = "btn-no"; no.textContent = "✕ Rejeter";
      no.onclick = function () { if (confirm("Rejeter et supprimer « " + e.name + " » ?")) act("/reject", e.id, no, "Suppression…"); };
      actions.appendChild(ok); actions.appendChild(no);
      listEl.appendChild(card);
    });
  }

  function act(pathname, id, btn, busy) {
    btn.disabled = true; var prev = btn.textContent; btn.textContent = busy;
    fetch(base() + pathname, { method: "POST",
      headers: { "Content-Type": "application/json", "X-Admin-Token": tokEl.value },
      body: JSON.stringify({ id: id }) })
      .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
      .then(function (res) {
        if (!res.ok) { alert("Erreur : " + (res.j.error || "")); btn.disabled = false; btn.textContent = prev; return; }
        load();   // refresh the list
      })
      .catch(function (e) { alert("Échec réseau : " + e); btn.disabled = false; btn.textContent = prev; });
  }
</script>
</body>
</html>
