<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AppDrop</title>
<style>
  :root{
    --accent:#2563eb; --accent2:#1e40af;
    --bg:#f4f6f9; --card:#ffffff; --text:#14181d; --muted:#6b7280; --border:#e5e7eb;
    --ok:#15803d; --okbg:#dcfce7; --bad:#b91c1c; --badbg:#fee2e2; --chip:#eef2ff; --warn:#92600a; --warnbg:#fef3c7;
    --shadow:0 1px 2px rgba(16,24,40,.06),0 10px 28px rgba(16,24,40,.06);
  }
  @media (prefers-color-scheme:dark){ :root{
    --bg:#0e1116; --card:#161b22; --text:#e7eaee; --muted:#9aa3ad; --border:#252b34;
    --ok:#4ade80; --okbg:#0f2e1c; --bad:#f87171; --badbg:#3a1414; --chip:#1b2433; --warn:#fbbf24; --warnbg:#2a210a;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 28px rgba(0,0,0,.35); } }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
  .hero{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;padding:22px 16px}
  .hero-inner{max-width:1000px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:13px}
  .brand svg{width:40px;height:40px;flex:0 0 auto}
  .brand-title{font-size:21px;font-weight:800;letter-spacing:.2px;line-height:1.1}
  .brand-sub{font-size:13px;opacity:.85;margin-top:2px}
  .lang{appearance:none;-webkit-appearance:none;background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.32);border-radius:10px;padding:8px 12px;font-size:14px;cursor:pointer}
  .lang option{color:#111}
  .wrap{max-width:1000px;margin:0 auto;padding:18px 16px 90px}
  .intro{color:var(--muted);font-size:14px;line-height:1.55;margin:6px 2px 14px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow)}
  .controls{padding:14px;margin-bottom:14px}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .field{flex:1;min-width:200px;display:flex;flex-direction:column;gap:6px;font-size:12px;color:var(--muted);font-weight:600}
  input,select{font:inherit;padding:9px 11px;border:1px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);font-size:14px;width:100%}
  input:focus,select:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:transparent}
  .adv{margin-top:12px;border-top:1px solid var(--border);padding-top:10px}
  .adv summary{cursor:pointer;font-size:13px;color:var(--accent);font-weight:600;list-style:none}
  .adv summary::-webkit-details-marker{display:none}
  .adv summary::before{content:"⚙ "}
  .adv .row{margin-top:10px}
  .check{display:flex;align-items:center;gap:9px;margin-top:12px;font-size:14px;color:var(--text);cursor:pointer}
  .check input{width:auto}
  .hint{font-size:12px;color:var(--muted);margin:6px 0 0;line-height:1.5}
  .mode{font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px;display:inline-block}
  .mode-admin{background:var(--okbg);color:var(--ok)} .mode-public{background:var(--chip);color:var(--muted)}
  .admin-row{text-align:right;margin-top:24px}
  .admin-link{font-size:15px;color:var(--muted);opacity:.4;cursor:pointer;user-select:none;padding:4px 8px;border-radius:8px}
  .admin-link:hover{opacity:1;color:var(--accent)}
  .adminpanel{display:none;padding:14px;margin-top:8px}
  .adminpanel .row+.row{margin-top:8px}
  .drop{background:var(--card);border:2px dashed var(--border);border-radius:18px;padding:32px 18px;text-align:center;color:var(--muted);transition:border-color .15s,background .15s}
  .drop.over{border-color:var(--accent);background:var(--chip)}
  .drop svg{width:44px;height:44px;color:var(--accent)}
  .drop-main{font-size:16px;color:var(--text);margin-top:10px}
  .link{color:var(--accent);font-weight:600;cursor:pointer;text-decoration:underline}
  .actionbar{display:flex;align-items:center;gap:14px;margin:16px 2px 8px;flex-wrap:wrap}
  .btn-primary{background:var(--accent);color:#fff;border:0;border-radius:12px;padding:11px 22px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 2px 10px rgba(37,99,235,.32);transition:transform .12s,opacity .12s}
  .btn-primary:hover:not(:disabled){transform:translateY(-1px)}
  .btn-primary:disabled{opacity:.45;cursor:default;box-shadow:none}
  .summary{font-size:13px;color:var(--muted)}
  .progress{height:6px;background:var(--border);border-radius:999px;overflow:hidden;margin:2px 2px 14px;display:none}
  .progress.on{display:block}
  .bar{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .3s}
  .list{overflow-x:auto}
  .tcard{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
  table{width:100%;border-collapse:separate;border-spacing:0;min-width:880px}
  thead th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);padding:11px 9px;border-bottom:1px solid var(--border)}
  tbody td{padding:9px;border-bottom:1px solid var(--border);vertical-align:middle}
  tbody tr:last-child td{border-bottom:0}
  tr.dim{opacity:.5}
  .ico{width:34px;height:34px;border-radius:9px;background:rgba(127,127,127,.12);object-fit:cover;display:block}
  .cell-app input{font-weight:600}
  .sub-in{margin-top:4px}
  .sub-in input{padding:5px 7px;font-size:12px;color:var(--muted)}
  td input,td select{padding:7px 8px;font-size:13px}
  .w-s{width:78px}.w-m{width:118px}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap}
  .pill-ok{background:var(--okbg);color:var(--ok)} .pill-bad{background:var(--badbg);color:var(--bad)} .pill-unk{background:var(--chip);color:var(--muted)}
  .badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;background:var(--chip);color:var(--muted);margin-top:4px}
  .st{font-size:12px;color:var(--muted);white-space:nowrap}
  .st-pub{color:var(--ok);font-weight:600}.st-err{color:var(--bad);font-weight:600}.st-warn{color:var(--warn)}
</style>
</head>
<body>
<header class="hero"><div class="hero-inner">
  <div class="brand">
    <svg viewBox="0 0 48 48" fill="none" aria-hidden="true"><rect x="4" y="4" width="40" height="40" rx="11" fill="rgba(255,255,255,.18)" stroke="rgba(255,255,255,.65)" stroke-width="2"/><path d="M24 13v17m0 0l-7-7m7 7l7-7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <div><div class="brand-title">AppDrop</div><div class="brand-sub" data-i18n="brand_sub"></div></div>
  </div>
  <select id="lang" class="lang" aria-label="Language"></select>
</div></header>

<main class="wrap">
  <p class="intro" data-i18n="intro"></p>

  <div class="controls card">
    <div class="row">
      <label class="field"><span data-i18n="deftype_label"></span><select id="dtype"></select></label>
      <label class="field"><span data-i18n="defcat_label"></span><input id="dcat" list="cats" data-i18n-ph="defcat_ph"></label>
    </div>
    <label class="check"><input type="checkbox" id="skipdups" checked> <span data-i18n="skip_dups"></span></label>
  </div>

  <div id="drop" class="drop">
    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 16V4m0 0L7.5 8.5M12 4l4.5 4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 15v3a2 2 0 002 2h12a2 2 0 002-2v-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    <div class="drop-main"><span data-i18n="drop_main"></span> <label class="link"><span data-i18n="drop_choose"></span><input id="file" type="file" accept=".ipa" multiple hidden></label></div>
  </div>

  <div class="actionbar">
    <button id="go" class="btn-primary" disabled data-i18n="btn_send"></button>
    <span id="summary" class="summary"></span>
  </div>
  <div class="progress" id="progress"><div class="bar" id="bar"></div></div>
  <div id="list" class="list"></div>
  <p class="hint" data-i18n="foot" style="margin-top:16px"></p>

  <div class="admin-row"><span id="adminToggle" class="admin-link" title="Admin">⚙</span></div>
  <div id="adminPanel" class="card adminpanel">
    <div class="row"><input id="token" type="password" data-i18n-ph="token_ph"></div>
    <div class="row"><input id="s3acc" data-i18n-ph="s3_access_ph"><input id="s3sec" type="password" data-i18n-ph="s3_secret_ph"></div>
    <p class="hint" data-i18n="s3_hint"></p>
    <p style="margin:10px 0 0"><span id="mode" class="mode mode-public"></span></p>
  </div>
</main>

<datalist id="cats">
  <option>Games</option><option>Entertainment</option><option>Utilities</option><option>Productivity</option>
  <option>Social Networking</option><option>Music</option><option>Photo &amp; Video</option><option>Travel</option>
  <option>Lifestyle</option><option>Health &amp; Fitness</option><option>Education</option><option>Finance</option>
  <option>News</option><option>Sports</option><option>Navigation</option><option>Reference</option>
  <option>Business</option><option>Weather</option><option>Books</option><option>Medical</option>
  <option>Food &amp; Drink</option><option>Catalogs</option><option>Newsstand</option>
</datalist>
<datalist id="subs">
  <option>Action</option><option>Adventure</option><option>Arcade</option><option>Board</option><option>Card</option>
  <option>Casino</option><option>Dice</option><option>Educational</option><option>Family</option><option>Kids</option>
  <option>Music</option><option>Puzzle</option><option>Racing</option><option>Role Playing</option>
  <option>Simulation</option><option>Sports</option><option>Strategy</option><option>Trivia</option><option>Word</option>
</datalist>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

// ───────── plist (binary + xml) ─────────
function readUInt(dv,off,size){ var v=0; for(var i=0;i<size;i++) v=v*256+dv.getUint8(off+i); return v; }
function parseBplist(buf){
  var dv=new DataView(buf), n=buf.byteLength, tr=n-32;

  var top=readUInt(dv,tr+16,8), offTable=readUInt(dv,tr+24,8);
  function offsetOf(i){ return readUInt(dv,offTable+i*offSize,offSize); }
  function lenAt(off){ var mk=dv.getUint8(off), l=1<<(mk&0xf); off++; var v=0; for(var i=0;i<l;i++) v=v*256+dv.getUint8(off+i); return [v,off+l]; }
  function obj(idx){
    var off=offsetOf(idx), mk=dv.getUint8(off), type=mk>>4, info=mk&0xf; off++;
    if(mk===0x00) return null; if(mk===0x08) return false; if(mk===0x09) return true;
    if(type===0x1){ var len=1<<info,v=0; for(var i=0;i<len;i++) v=v*256+dv.getUint8(off+i); return v; }
    if(type===0x2){ var len=1<<info; return len===4?dv.getFloat32(off):(len===8?dv.getFloat64(off):0); }
    if(type===0x5){ var len=info; if(info===0xf){var r=lenAt(off);len=r[0];off=r[1];} var s=""; for(var i=0;i<len;i++) s+=String.fromCharCode(dv.getUint8(off+i)); return s; }
    if(type===0x6){ var len=info; if(info===0xf){var r=lenAt(off);len=r[0];off=r[1];} var s=""; for(var i=0;i<len;i++) s+=String.fromCharCode(dv.getUint16(off+i*2,false)); return s; }
    if(type===0xa||type===0xc){ var len=info; if(info===0xf){var r=lenAt(off);len=r[0];off=r[1];} var a=[]; for(var i=0;i<len;i++) a.push(obj(readUInt(dv,off+i*refSize,refSize))); return a; }
    if(type===0xd){ var len=info; if(info===0xf){var r=lenAt(off);len=r[0];off=r[1];} var kr=[],vr=[]; for(var i=0;i<len;i++) kr.push(readUInt(dv,off+i*refSize,refSize)); for(var i=0;i<len;i++) vr.push(readUInt(dv,off+(len+i)*refSize,refSize)); var d={}; for(var i=0;i<len;i++) d[obj(kr[i])]=obj(vr[i]); return d; }
    return null;
  }

}
function parseXmlPlist(text){
  var doc=new DOMParser().parseFromString(text,"application/xml");
  var top=doc.querySelector("plist > *");
  function walk(node){
    var tg=node.tagName;
    if(tg==="dict"){ var d={},k=null; for(var i=0;i<node.children.length;i++){ var c=node.children[i]; if(c.tagName==="key") k=c.textContent; else { d[k]=walk(c); k=null; } } return d; }
    if(tg==="array") return Array.prototype.map.call(node.children,walk);
    if(tg==="string") return node.textContent; if(tg==="integer") return parseInt(node.textContent,10);
    if(tg==="real") return parseFloat(node.textContent); if(tg==="true") return true; if(tg==="false") return false;
    return node.textContent;
  }
  return top?walk(top):{};
}
function readPlist(u8){

}

// ───────── Mach-O cryptid ─────────
function machoCryptid(buf){
  var dv=new DataView(buf); if(buf.byteLength<28) return "unknown";
  var m=dv.getUint32(0,false), sliceOff=0;
  if(m===0xcafebabe||m===0xbebafeca){
    var nfat=dv.getUint32(4,false); if(nfat>16) return "unknown";
    var arm=-1,first=-1;
    for(var i=0;i<nfat;i++){ var ao=8+i*20; var cpu=dv.getUint32(ao,false); var off=dv.getUint32(ao+8,false); if(first<0)first=off; if(cpu===12||cpu===0x0100000c){arm=off;break;} }
    sliceOff=arm>=0?arm:first; if(sliceOff<0||sliceOff+28>buf.byteLength) return "unknown";
  }
  var le, ml=dv.getUint32(sliceOff,true), mb=dv.getUint32(sliceOff,false), is64;
  if(ml===0xfeedface){is64=false;le=true;} else if(ml===0xfeedfacf){is64=true;le=true;}
  else if(mb===0xfeedface){is64=false;le=false;} else if(mb===0xfeedfacf){is64=true;le=false;}
  else return "unknown";
  var ncmds=dv.getUint32(sliceOff+16,le); if(ncmds===0||ncmds>2048) return "unknown";
  var cmdOff=sliceOff+(is64?32:28);
  for(var i=0;i<ncmds;i++){
    if(cmdOff+8>buf.byteLength) return "unknown";
    var cmd=dv.getUint32(cmdOff,le)&0x7fffffff, cmdsize=dv.getUint32(cmdOff+4,le); if(cmdsize<8) return "unknown";
    if(cmd===0x21||cmd===0x2c){ if(cmdOff+20>buf.byteLength) return "unknown"; return dv.getUint32(cmdOff+16,le)===0?"decrypted":"encrypted"; }
    cmdOff+=cmdsize;
  }
  return "decrypted";
}

// ───────── analyse one .ipa ─────────
function appPrefixOf(zip){ var best=null; zip.forEach(function(p){ if(/^Payload\/[^/]+\.app\/Info\.plist$/.test(p)) best=p.replace(/Info\.plist$/,""); }); return best; }
function iconScore(stem){ if(stem.indexOf("@3x")>=0) return 3; if(stem.indexOf("@2x")>=0) return 2; if(stem.indexOf("~ipad")>=0) return 1; return 0; }
async function analyze(file){
  var ab=await file.arrayBuffer();
  var out={name:file.name.replace(/\.ipa$/i,""),bid:"",version:"",min_ios:"",plat:0,enc:"unknown",iconB64:""};
  try{
    var zip=await JSZip.loadAsync(ab);
    var prefix=appPrefixOf(zip);
    if(prefix){
      var info=readPlist(await zip.file(prefix+"Info.plist").async("uint8array"));
      out.name=info.CFBundleDisplayName||info.CFBundleName||out.name;
      out.bid=info.CFBundleIdentifier||"";
      out.version=info.CFBundleShortVersionString||info.CFBundleVersion||"";
      out.min_ios=info.MinimumOSVersion||"";
      var fam=info.UIDeviceFamily; if(Array.isArray(fam)){ var p=0; if(fam.indexOf(1)>=0)p|=2; if(fam.indexOf(2)>=0)p|=4; out.plat=p; }
      var exec=info.CFBundleExecutable;
      if(exec&&zip.file(prefix+exec)){ var eb=await zip.file(prefix+exec).async("uint8array"); out.enc=machoCryptid(eb.buffer.slice(eb.byteOffset,eb.byteOffset+eb.byteLength)); }
      var bases=[];
      function harvest(ic){ if(ic&&ic.CFBundlePrimaryIcon&&Array.isArray(ic.CFBundlePrimaryIcon.CFBundleIconFiles)) bases=bases.concat(ic.CFBundlePrimaryIcon.CFBundleIconFiles); }
      harvest(info.CFBundleIcons); harvest(info["CFBundleIcons~ipad"]);
      if(Array.isArray(info.CFBundleIconFiles)) bases=bases.concat(info.CFBundleIconFiles);
      if(typeof info.CFBundleIconFile==="string") bases.push(info.CFBundleIconFile);
      bases=bases.concat(["AppIcon60x60","AppIcon","Icon","Icon-60","icon"]);
      var norm=bases.filter(function(b){return typeof b==="string"&&b;}).map(function(b){ b=b.toLowerCase(); return b.slice(-4)===".png"?b.slice(0,-4):b; });
      var bestEntry=null,bestScore=-1;
      zip.forEach(function(path,entry){
        if(entry.dir||path.indexOf(prefix)!==0) return;
        var rest=path.slice(prefix.length); if(rest.indexOf("/")>=0) return;
        if(rest.slice(-4).toLowerCase()!==".png") return;
        var stem=rest.slice(0,-4).toLowerCase();
        var ok=norm.some(function(b){ return stem===b||stem.indexOf(b+"@")===0||stem.indexOf(b+"~")===0; });
        if(!ok) return; var sc=iconScore(stem); if(sc>bestScore){ bestScore=sc; bestEntry=entry; }
      });
      if(bestEntry){ var pb=await bestEntry.async("base64"); if(pb&&pb.length<2000000) out.iconB64=pb; }
    }
  }catch(e){}
  return out;
}

async function loadIndex(){
  try{
    var r=await fetch(PAGES+"/catalog-index.txt",{cache:"force-cache"}); if(!r.ok) return;
    var text=await r.text(); var bs=new Set(), bvs=new Set();
    var lines=text.split("\n");
    for(var i=0;i<lines.length;i++){ var ln=lines[i]; if(!ln) continue; var tab=ln.indexOf("\t"); if(tab<0){ bs.add(ln); continue; }
      var bid=ln.slice(0,tab); bs.add(bid); var vers=ln.slice(tab+1).split(","); for(var j=0;j<vers.length;j++) bvs.add(bid+"|"+vers[j]); }
    bidSet=bs; bidVerSet=bvs;
    items.forEach(markIndex); refreshStatuses();
  }catch(e){}
}
function markIndex(it){
  if(!bidSet) return; var bl=(it.bid||"").toLowerCase();
  it.known = !!(bl && bidSet.has(bl));
  it.dup = !!(bl && it.version && bidVerSet && bidVerSet.has(bl+"|"+it.version));
}

    var catPh = it.known? t("cat_inherited") : t("cat_ph");
    return '<tr class="'+dim.trim()+'">'+
      '<td><img class="ico" src="'+(it.iconB64?("data:image/png;base64,"+it.iconB64):"")+'"></td>'+
      '<td class="cell-app"><input value="'+esc(it.name)+'" oninput="items['+i+'].name=this.value">'+
        '<div class="sub-in"><input value="'+esc(it.bid)+'" placeholder="'+esc(t("bid_ph"))+'" oninput="items['+i+'].bid=this.value;markIndex(items['+i+']);refreshStatuses()"></div>'+badge+'</td>'+
      '<td class="w-s"><input value="'+esc(it.version)+'" oninput="items['+i+'].version=this.value;markIndex(items['+i+']);refreshStatuses()"></td>'+
      '<td class="w-s"><input value="'+esc(it.min_ios)+'" oninput="items['+i+'].min_ios=this.value"></td>'+
      '<td>'+pill+'</td>'+
      '<td class="w-m"><select onchange="items['+i+'].type=this.value">'+typeOpts(it.type)+'</select></td>'+
      '<td class="w-m"><input list="cats" value="'+esc(it.category)+'" placeholder="'+esc(catPh)+'" oninput="items['+i+'].category=this.value;render()"></td>'+
      '<td class="w-m"><input list="subs" value="'+esc(it.subgenre)+'" placeholder="'+esc(t("sub_ph"))+'" oninput="items['+i+'].subgenre=this.value"></td>'+
      '<td>'+statusHTML(it)+'</td></tr>';
  }).join('');
  listEl.innerHTML = items.length ? ('<div class="tcard"><table><thead><tr><th></th><th>'+esc(t("th_app"))+'</th><th>'+esc(t("th_ver"))+'</th><th>'+esc(t("th_ios"))+'</th><th>'+esc(t("th_state"))+'</th><th>'+esc(t("th_type"))+'</th><th>'+esc(t("th_cat"))+'</th><th>'+esc(t("th_sub"))+'</th><th>'+esc(t("th_status"))+'</th></tr></thead><tbody>'+rows+'</tbody></table></div>') : '';
  var enc=items.filter(function(x){return x.enc==="encrypted";}).length;
  var dup=items.filter(function(x){return x.status==="dup";}).length;
  var parts=[]; if(items.length) parts.push(t("sum_apps",items.length)); if(enc) parts.push(t("sum_enc",enc)); if(dup) parts.push(t("sum_dup",dup));
  sumEl.textContent=parts.join(" · ");
  updateMode();
}
function updateMode(){ if(!modeEl) return; var a=isAdmin(); modeEl.textContent=a?t("mode_admin"):t("mode_public"); modeEl.className="mode "+(a?"mode-admin":"mode-public"); }

// ───────── validation ─────────
function validate(it){
  if(!it.name){ it.status="need_name"; return false; }
  if(it.type==="catalog" && !it.known){
    if(!it.category){ it.status="need_cat"; return false; }
    if(it.category.toLowerCase()==="games" && !it.subgenre){ it.status="need_sub"; return false; }
  }
  return true;
}

// ───────── archive.org direct upload (admin) ─────────
async function iaPut(identifier,filename,body,ctype,title){
  var url="https://s3.us.archive.org/"+encodeURIComponent(identifier)+"/"+encodeURIComponent(filename);
  var r=await fetch(url,{method:"PUT",headers:{
    "authorization":"LOW "+s3accEl.value.trim()+":"+s3secEl.value.trim(),
    "x-amz-auto-make-bucket":"1","x-archive-meta-mediatype":"software","x-archive-meta-title":String(title||identifier).slice(0,200),
    "Content-Type":ctype},body:body});
  if(!r.ok){ var tx=await r.text().catch(function(){return"";}); throw new Error("archive.org "+r.status+" "+tx.slice(0,120)); }
  return "https://archive.org/download/"+encodeURIComponent(identifier)+"/"+encodeURIComponent(filename);
}
async function uploadToArchive(it){
  it.status="ia_upload"; render();
  var ident="appdrop-"+slugify(it.bid||it.name)+"-"+slugify(it.version||"1");
  var fn=slugify(it.bid||it.name)+".ipa";
  var ipaUrl=await iaPut(ident,fn,it.file,"application/octet-stream",it.name);
  var iconUrl="";
  if(it.iconB64){ try{ var blob=await (await fetch("data:image/png;base64,"+it.iconB64)).blob(); iconUrl=await iaPut(ident,"icon.png",blob,"image/png",it.name); }catch(e){} }
  it.ipa_url=ipaUrl; it.icon_url=iconUrl;
  it._entry={target:it.type,name:it.name,bid:it.bid,version:it.version,min_ios:it.min_ios,plat:it.plat||0,size:it.file.size,
    category:it.known?"":(it.category||""),subgenre:it.known?"":(it.subgenre||""),ipa_url:ipaUrl,icon_url:iconUrl};
  it.status="uploaded"; render();
}

// ───────── public upload (base64 → Worker → moderation) ─────────
function fileToB64(file){ return new Promise(function(res,rej){ var r=new FileReader(); r.onload=function(){ var s=r.result; res(s.slice(s.indexOf(",")+1)); }; r.onerror=rej; r.readAsDataURL(file); }); }
async function uploadPublic(it){
  if(it.file.size>24*1024*1024){ it.status="err"; it.statusErr=t("st_too_big_public"); render(); return; }
  it.status="sending"; render();
  try{
    var b64=await fileToB64(it.file);
    var payload={target:it.type,name:it.name,bid:it.bid,min_ios:it.min_ios,appver:it.version,category:it.known?"":(it.category||""),subgenre:it.known?"":(it.subgenre||""),plat:it.plat||0,ipa:b64,attest:true,decrypted:true,description:"",lang:"",device:"desktop-bulk"};
    if(it.iconB64) payload.icon_png=it.iconB64;
    var r=await fetch(base()+"/upload",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    var j=await r.json().catch(function(){return{};});
    if(r.ok){ it.status="queued"; } else { it.status="err"; it.statusErr=j.error||("HTTP "+r.status); }
  }catch(e){ it.status="err"; it.statusErr=String(e&&e.message||e); }
  render();
}

// ───────── run ─────────
async function run(){
  localStorage.setItem("appdrop_admin",tokEl.value);
  localStorage.setItem("appdrop_ia_access",s3accEl.value); localStorage.setItem("appdrop_ia_secret",s3secEl.value);
  goEl.disabled=true; goEl.textContent=t("btn_sending"); progEl.classList.add("on");
  var admin=isAdmin();
  var queue=items.filter(function(x){ return x.enc!=="encrypted" && x.status!=="dup" && x.status!=="published" && validate(x); });
  render();
  var idx=0,done=0,total=queue.length,CONC=3;
  function tick(){ done++; barEl.style.width=(total?(done/total*100):100)+"%"; }
  if(admin){
    async function w(){ while(idx<queue.length){ var it=queue[idx++]; try{ await uploadToArchive(it); }catch(e){ it.status="err"; it.statusErr=String(e&&e.message||e); render(); } tick(); } }
    await Promise.all([w(),w(),w()]);
    var entries=queue.filter(function(x){return x.status==="uploaded";});
    if(entries.length){
      try{
        var r=await fetch(base()+"/ingest",{method:"POST",headers:{"Content-Type":"application/json","X-Admin-Token":tokEl.value.trim()},body:JSON.stringify({apps:entries.map(function(x){return x._entry;})})});
        var j=await r.json().catch(function(){return{};});
        entries.forEach(function(x){ if(r.ok){ x.status="published"; } else { x.status="err"; x.statusErr=j.error||("HTTP "+r.status); } });
      }catch(e){ entries.forEach(function(x){ x.status="err"; x.statusErr=String(e&&e.message||e); }); }
      render();
    }
  } else {
    async function wp(){ while(idx<queue.length){ var it=queue[idx++]; await uploadPublic(it); tick(); } }
    await Promise.all([wp(),wp(),wp()]);
  }
  goEl.disabled=false; goEl.textContent=t("btn_send");
}

// ───────── i18n apply + init ─────────
function applyI18n(){
  document.documentElement.lang=LANG; document.title="AppDrop — "+t("brand_sub");
  var nodes=document.querySelectorAll("[data-i18n]"); for(var i=0;i<nodes.length;i++) nodes[i].textContent=t(nodes[i].getAttribute("data-i18n"));
  var ph=document.querySelectorAll("[data-i18n-ph]"); for(var j=0;j<ph.length;j++) ph[j].placeholder=t(ph[j].getAttribute("data-i18n-ph"));
  dtypeEl.innerHTML=typeOpts(dtypeEl.value||"catalog"); goEl.textContent=t("btn_send"); render();
}
window.addEventListener("DOMContentLoaded",function(){
  tokEl=document.getElementById("token");
  s3accEl=document.getElementById("s3acc"); s3secEl=document.getElementById("s3sec");
  listEl=document.getElementById("list"); goEl=document.getElementById("go"); sumEl=document.getElementById("summary");
  progEl=document.getElementById("progress"); barEl=document.getElementById("bar"); dtypeEl=document.getElementById("dtype"); modeEl=document.getElementById("mode");
  tokEl.value=localStorage.getItem("appdrop_admin")||"";
  s3accEl.value=localStorage.getItem("appdrop_ia_access")||"";
  s3secEl.value=localStorage.getItem("appdrop_ia_secret")||"";
  var sel=document.getElementById("lang");
  sel.innerHTML=LANGS.map(function(l){ return '<option value="'+l[0]+'"'+(l[0]===LANG?" selected":"")+'>'+l[1]+'</option>'; }).join('');
  sel.addEventListener("change",function(){ LANG=sel.value; localStorage.setItem("appdrop_lang",LANG); applyI18n(); });
  [tokEl,s3accEl,s3secEl].forEach(function(el){ el.addEventListener("input",updateMode); });
  document.getElementById("skipdups").addEventListener("change",refreshStatuses);
  document.getElementById("adminToggle").addEventListener("click",function(){ var p=document.getElementById("adminPanel"); p.style.display=(p.style.display==="block")?"none":"block"; });
  applyI18n();
  var drop=document.getElementById("drop");
  drop.addEventListener("dragover",function(e){ e.preventDefault(); drop.classList.add("over"); });
  drop.addEventListener("dragleave",function(){ drop.classList.remove("over"); });
  drop.addEventListener("drop",function(e){ e.preventDefault(); drop.classList.remove("over"); if(e.dataTransfer&&e.dataTransfer.files) addFiles(e.dataTransfer.files); });
  document.getElementById("file").addEventListener("change",function(e){ addFiles(e.target.files); });
  goEl.addEventListener("click",run);
  loadIndex();
});
</script>
